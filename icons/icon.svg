<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景：深山吹（角丸正方形） -->
  <rect width="512" height="512" rx="96" ry="96" fill="#9a7232"/>

  <!-- 湯気（3本の波線） -->
  <g fill="none" stroke="#fdf9ee" stroke-width="14" stroke-linecap="round">
    <path d="M 170 180 C 170 156, 200 156, 200 132 C 200 108, 170 108, 170 84"/>
    <path d="M 256 200 C 256 172, 286 172, 286 144 C 286 116, 256 116, 256 88"/>
    <path d="M 342 180 C 342 156, 372 156, 372 132 C 372 108, 342 108, 342 84"/>
  </g>

  <!-- 湯舟（楕円形の桶） -->
  <g>
    <!-- 桶の本体 -->
    <path d="M 96 270
             Q 96 260 106 260
             L 406 260
             Q 416 260 416 270
             L 396 410
             Q 392 432 372 432
             L 140 432
             Q 120 432 116 410
             Z"
          fill="#fdf9ee"/>
    <!-- 桶の縁の線 -->
    <ellipse cx="256" cy="262" rx="158" ry="14" fill="#f8edcf"/>
    <!-- 湯面 -->
    <ellipse cx="256" cy="262" rx="148" ry="9" fill="#c69a4d" opacity="0.5"/>
  </g>
</svg>
