      const handleMenuClick = (e) => {
        e.stopPropagation();
        onOpenMenu(plan);

        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleClick();
        }
      };
      const cls = [
        "resident-card",
        isDone && "is-done",
        isUnimplemented && "is-unimplemented",
      ].filter(Boolean).join(" ");
      return (
        <div
          className={cls}
          onClick={handleClick}
          onKeyDown={handleKey}
          role="button"
          tabIndex={0}
          aria-pressed={isDone}
          aria-label={`${resident.名前} ${isDone ? "済" : isUnimplemented ? "未実施" : "予定"}`}

    function EmptyState({ title, body }) {

    /* ============================================================
       モーダル基盤
       ============================================================ */

    function Modal({ open, onClose, title, subtitle, footer, children, headerExtra, dismissible = true, modalClass = "" }) {
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === "Escape" && dismissible) onClose(); };
        document.addEventListener("keydown", onKey);
        const prevOverflow = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        return () => {
          document.removeEventListener("keydown", onKey);
          document.body.style.overflow = prevOverflow;
        };
      }, [open, onClose, dismissible]);

      if (!open) return null;
      return (
        <div
          className="modal-overlay no-print"
          onClick={(e) => { if (e.target === e.currentTarget && dismissible) onClose(); }}
          role="dialog"
          aria-modal="true"
        >
          <div className={`modal ${modalClass}`} onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h2 className="modal-title">{title}</h2>
              {subtitle && <p className="modal-subtitle">{subtitle}</p>}
              {headerExtra}
            </div>
            <div className="modal-body">{children}</div>
            {footer && <div className="modal-footer">{footer}</div>}
          </div>
        </div>
      );
    }

    /* ============================================================
       スタッフ選択ドロップダウン
       職種＋サブ役割で候補を絞り、選択済みは除外。
       バッジ表記（看/支）は select の option では表現できないので接頭辞で代用。
       ============================================================ */
    function StaffSelect({ value, onChange, staffList, 職種, サブ役割, excludeIds, placeholder }) {
      const candidates = useMemo(
        () => filterStaffCandidates(staffList, { 職種, サブ役割, excludeIds }),
        [staffList, 職種, サブ役割, excludeIds]
      );
      const isEmpty = !value;
      const prefix = (s) => (s.職種 === "看護師" ? "［看］" : "［支］");
      // 選択中の値が候補に含まれていない場合（他のポジションで選択された等）でも表示できるよう補完
      const selected = value ? staffList.find(s => s.id === value) : null;

      return (
        <select
          className={`team-select ${isEmpty ? "is-empty" : ""}`}
          value={value || ""}
          onChange={(e) => onChange(e.target.value || null)}
        >
          <option value="">{placeholder || "（未選択）"}</option>
          {selected && !candidates.some(c => c.id === selected.id) && (
            <option value={selected.id}>{prefix(selected)}{selected.名前}</option>
          )}
          {candidates.map(s => (
            <option key={s.id} value={s.id}>{prefix(s)}{s.名前}</option>
          ))}
        </select>
      );
    }

    /* ============================================================
       体制設定モーダル
       ============================================================ */
    function TeamModal({ open, onClose, dateStr, initialSession, sessionTeams, staffList, onSave }) {
      const [session, setSession] = useState(initialSession || "AM");
      const [draft, setDraft] = useState(() => emptyTeam(dateStr, initialSession || "AM"));

      // open / session 切替時に既存データをロード
      useEffect(() => {
        if (!open) return;
        const existing = findTeam(sessionTeams, dateStr, session);
        if (existing) {
          // 互換: 古いデータに無いフィールドを補完
          setDraft({
            ...emptyTeam(dateStr, session),
            ...existing,
            入浴介助: {
              看護師: existing.入浴介助?.看護師 ?? null,
              支援員: [
                existing.入浴介助?.支援員?.[0] ?? null,
                existing.入浴介助?.支援員?.[1] ?? null,
              ],
            },
            処置: { 看護師: existing.処置?.看護師 ?? null },
            更衣: {
              支援員: existing.更衣?.支援員 && existing.更衣.支援員.length > 0
                ? existing.更衣.支援員
                : [null],
            },
            外回り: {
              看護師: existing.外回り?.看護師 ?? null,
              支援員: existing.外回り?.支援員 ?? null,
              看護師不在: existing.外回り?.看護師不在 ?? false,
            },
          });
        } else {
          setDraft(emptyTeam(dateStr, session));
        }
      }, [open, session, dateStr, sessionTeams]);

      // 全ポジションの選択済みID（重複防止用）
      const allAssigned = useMemo(() => collectAssignedStaffIds(draft), [draft]);

      const updateBathing = (kind, idx, value) => {
        setDraft(prev => {
          if (kind === "看護師") return { ...prev, 入浴介助: { ...prev.入浴介助, 看護師: value } };
          const sup = [...prev.入浴介助.支援員];
          sup[idx] = value;
          return { ...prev, 入浴介助: { ...prev.入浴介助, 支援員: sup } };
        });
      };
      const updateProcessing = (value) => {
        setDraft(prev => ({ ...prev, 処置: { 看護師: value } }));
      };
      const updateClothing = (idx, value) => {
        setDraft(prev => {
          const sup = [...prev.更衣.支援員];
          sup[idx] = value;
          return { ...prev, 更衣: { 支援員: sup } };
        });
      };
      const addClothingSlot = () => {
        setDraft(prev => {
          if (prev.更衣.支援員.length >= 2) return prev;
          return { ...prev, 更衣: { 支援員: [...prev.更衣.支援員, null] } };
        });
      };
      const removeClothingSlot = (idx) => {
        setDraft(prev => {
          const sup = prev.更衣.支援員.filter((_, i) => i !== idx);
          return { ...prev, 更衣: { 支援員: sup.length > 0 ? sup : [null] } };
        });
      };
      const updateExterior = (kind, value) => {
        setDraft(prev => ({ ...prev, 外回り: { ...prev.外回り, [kind]: value } }));
      };
      const toggleNurseAbsent = (checked) => {
        setDraft(prev => ({
          ...prev,
          外回り: {
            ...prev.外回り,
            看護師不在: checked,
            看護師: checked ? null : prev.外回り.看護師,
          },
        }));
      };

      // 自身が選んだ値は除外しないように、各ポジションの除外リストは「allAssigned から自分の値を除いたもの」
      const excludeOf = (selfValue) => allAssigned.filter(id => id !== selfValue);

      const handleSave = () => {
        onSave(draft);
        onClose();
      };

      const dateLabel = useMemo(() => {
        const [y, m, d] = dateStr.split("-").map(Number);
        return `${y}年${m}月${d}日`;
      }, [dateStr]);

      const subtitle = `${dateLabel} ／ 今後の入浴記録に自動で紐づきます`;

      const headerExtra = (
        <div className="modal-session-switch">
          <button
            type="button"
            className={session === "AM" ? "is-active" : ""}
            onClick={() => setSession("AM")}
          >午前</button>
          <button
            type="button"
            className={session === "PM" ? "is-active" : ""}
            onClick={() => setSession("PM")}
          >午後</button>
        </div>
      );

      return (
        <Modal
          open={open}
          onClose={onClose}
          title="本日の体制"
          subtitle={subtitle}
          headerExtra={headerExtra}
          footer={
            <>
              <span className="modal-footer-hint">体制が変わったタイミングで再設定してください</span>
              <button type="button" className="btn btn-ghost" onClick={onClose}>キャンセル</button>
              <button type="button" className="btn btn-primary" onClick={handleSave}>この体制で保存</button>
            </>
          }
        >
          {/* 入浴介助 */}
          <div className="team-section">
            <h3 className="team-section-title">
              入浴介助
              <span className="team-section-meta">看護師 1 + 支援員 2</span>
            </h3>
            <div className="team-row">
              <span className="team-row-label">看護師</span>
              <StaffSelect
                value={draft.入浴介助.看護師}
                onChange={(v) => updateBathing("看護師", 0, v)}
                staffList={staffList}
                職種="看護師"
                サブ役割="入浴介助"
                excludeIds={excludeOf(draft.入浴介助.看護師)}
              />
            </div>
            <div className="team-row">
              <span className="team-row-label">支援員 1</span>
              <StaffSelect
                value={draft.入浴介助.支援員[0]}
                onChange={(v) => updateBathing("支援員", 0, v)}
                staffList={staffList}
                職種="支援員"
                サブ役割="入浴介助"
                excludeIds={excludeOf(draft.入浴介助.支援員[0])}
              />
            </div>
            <div className="team-row">
              <span className="team-row-label">支援員 2</span>
              <StaffSelect
                value={draft.入浴介助.支援員[1]}
                onChange={(v) => updateBathing("支援員", 1, v)}
                staffList={staffList}
                職種="支援員"
                サブ役割="入浴介助"
                excludeIds={excludeOf(draft.入浴介助.支援員[1])}
              />
            </div>
          </div>

          {/* 処置 */}
          <div className="team-section">
            <h3 className="team-section-title">
              処置
              <span className="team-section-meta">看護師 1</span>
            </h3>
            <div className="team-row">
              <span className="team-row-label">看護師</span>
              <StaffSelect
                value={draft.処置.看護師}
                onChange={updateProcessing}
                staffList={staffList}
                職種="看護師"
                サブ役割="処置"
                excludeIds={excludeOf(draft.処置.看護師)}
              />
            </div>
          </div>

          {/* 更衣 */}
          <div className="team-section">
            <h3 className="team-section-title">
              更衣
              <span className="team-section-meta">支援員 1〜2</span>
            </h3>
            {draft.更衣.支援員.map((id, idx) => (
              <div key={idx} className="team-row">
                <span className="team-row-label">支援員 {idx + 1}</span>
                <StaffSelect
                  value={id}
                  onChange={(v) => updateClothing(idx, v)}
                  staffList={staffList}
                  職種="支援員"
                  サブ役割="更衣"
                  excludeIds={excludeOf(id)}
                />
                {draft.更衣.支援員.length > 1 && (
                  <button
                    type="button"
                    className="team-row-remove"
                    onClick={() => removeClothingSlot(idx)}
                    aria-label="この枠を削除"
                  >×</button>
                )}
              </div>
            ))}
            {draft.更衣.支援員.length < 2 && (
              <button type="button" className="team-add-button" onClick={addClothingSlot}>
                ＋ もう1人追加
              </button>
            )}
          </div>

          {/* 外回り */}
          <div className="team-section">
            <h3 className="team-section-title">
              外回り
              <span className="team-section-meta">看護師 1（不在可）+ 支援員 1</span>
            </h3>
            <div className="team-row">
              <span className="team-row-label">看護師</span>
              <StaffSelect
                value={draft.外回り.看護師}
                onChange={(v) => updateExterior("看護師", v)}
                staffList={staffList}

    /* 週マトリクスビュー */
    function WeekMatrixView({ data, today, weekStart }) {
      const days = useMemo(() => weekDays(weekStart), [weekStart]);
      const fromStr = ymd(days[0]);
      const toStr   = ymd(days[days.length - 1]);
      const todayStr = ymd(today);

      const [filters, setFilters] = useState({ shortStay: false, warnOnly: false });
      const [search, setSearch] = useState("");

      const aggMap = useMemo(
        () => aggregateBathByResident(data.bathPlans, fromStr, toStr),
        [data.bathPlans, fromStr, toStr]
      );

      const rows = useMemo(() => {
        let list = data.residents.filter(r => r.在籍中);
        if (filters.shortStay) list = list.filter(r => r.区分 === "短期");
        if (search.trim()) {
          const q = search.trim();
          list = list.filter(r =>
            r.名前.includes(q) || (r.フリガナ || "").includes(q) || (r.部屋番号 || "").includes(q)
          );
        }
        list = [...list].sort(sortByRoom);

        const enriched = list.map(r => {
          const plansForR = aggMap.get(r.id) || [];
          const byDay = new Map(); // dateStr -> {AM:bool, PM:bool}
          plansForR.forEach(p => {
            if (!byDay.has(p.日付)) byDay.set(p.日付, { AM: false, PM: false });
            byDay.get(p.日付)[p.セッション] = true;
          });
          const total = plansForR.length;
          return { resident: r, byDay, total };
        });

        if (filters.warnOnly) return enriched.filter(x => x.total <= 1);
        return enriched;
      }, [data.residents, aggMap, filters, search]);

      // 日合計（AM+PMをそれぞれ別カウント）
      const dayTotals = useMemo(() => {
        return days.map(d => {
          const dStr = ymd(d);
          let count = 0;
          rows.forEach(row => {
            const e = row.byDay.get(dStr);
            if (e?.AM) count++;
            if (e?.PM) count++;
          });
          return count;
        });
      }, [rows, days]);

      return (
        <div>
          <FilterBarSimple
            search={search}
            onSearch={setSearch}
            filters={filters}
            onToggleFilter={(k) => setFilters(prev => ({ ...prev, [k]: !prev[k] }))}
            chips={[
              { key: "shortStay", label: "短期のみ" },
              { key: "warnOnly",  label: "警告のみ（週計1回以下）" },
            ]}
          />
          <div className="matrix-wrap">
            <table className="matrix-table">
              <thead>
                <tr>
                  <th className="col-room">部屋</th>
                  <th className="col-name">利用者</th>
                  {days.map((d, i) => {
                    const isToday = ymd(d) === todayStr;
                    return (
                      <th key={i} className={`col-day ${isToday ? "is-today" : ""}`}>
                        {weekdayShort(d)}<br />{mmdd(d)}
                      </th>
                    );
                  })}
                  <th className="col-day">週計</th>
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 ? (
                  <tr><td colSpan={days.length + 3} className="matrix-empty">該当する利用者がいません</td></tr>
                ) : rows.map(row => {
                  const total = row.total;
                  const totalCls = total === 0 ? "warn-critical" : total === 1 ? "warn-attention" : "";
                  return (
                    <tr key={row.resident.id}>
                      <td className="col-room">{row.resident.部屋番号}</td>
                      <td className="col-name">
                        {row.resident.区分 === "短期" && <span className="short-mark">短</span>}
                        {row.resident.名前}
                      </td>
                      {days.map((d, i) => {
                        const dStr = ymd(d);
                        const cell = row.byDay.get(dStr);
                        const isToday = dStr === todayStr;
                        return (
                          <td key={i} className={`col-day ${isToday ? "is-today" : ""}`}>
                            {cell?.AM && <div className="matrix-bath-badge am">朝</div>}
                            {cell?.PM && <div className="matrix-bath-badge pm">午</div>}
                            {!cell?.AM && !cell?.PM && <span className="matrix-empty">—</span>}
                          </td>
                        );
                      })}
                      <td className="col-day">
                        <span className={`matrix-week-total ${totalCls}`}>
                          {total === 0 && <span className="warn-triangle" />}
                          {total}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr>
                  <td colSpan={2}>日合計</td>
                  {dayTotals.map((c, i) => (
                    <td key={i} className={`col-day ${ymd(days[i]) === todayStr ? "is-today" : ""}`}>{c}</td>
                  ))}
                  <td className="col-day">{dayTotals.reduce((a, b) => a + b, 0)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      );
    }

    /* 月達成率ビュー */
    function MonthAchievementView({ data, monthStart }) {
      const monthEndDate = new Date(monthStart);
      monthEndDate.setMonth(monthEndDate.getMonth() + 1);
      monthEndDate.setDate(0);
      const fromStr = ymd(monthStart);
      const toStr   = ymd(monthEndDate);

      const goalPerWeek = data.settings.入浴目標.週 || 3;
      const weeksThisMonth = weeksInMonth(monthStart);
      const goal = goalPerWeek * weeksThisMonth;

      const [filters, setFilters] = useState({ shortStay: false, unmetOnly: false });
      const [search, setSearch] = useState("");

      const aggMap = useMemo(
        () => aggregateBathByResident(data.bathPlans, fromStr, toStr),
        [data.bathPlans, fromStr, toStr]
      );

      const rows = useMemo(() => {
        let list = data.residents.filter(r => r.在籍中);
        if (filters.shortStay) list = list.filter(r => r.区分 === "短期");
        if (search.trim()) {
          const q = search.trim();
          list = list.filter(r =>
            r.名前.includes(q) || (r.フリガナ || "").includes(q) || (r.部屋番号 || "").includes(q)
          );
        }
        list = [...list].sort(sortByRoom);

        const enriched = list.map(r => {
          const a = computeMonthAchievement(data.bathPlans, r, monthStart, goalPerWeek);
          return { resident: r, ...a };
        });

        if (filters.unmetOnly) {
          return enriched.filter(x => x.level === "warn" || x.level === "attention");
        }
        return enriched;
      }, [data.residents, data.bathPlans, monthStart, goalPerWeek, filters, search]);

      // 達成状況サマリ（除外利用者は集計から外す）
      const summary = useMemo(() => {
        const counts = { good: 0, mid: 0, attention: 0, warn: 0, excluded: 0 };
        let pctSum = 0;
        let counted = 0;
        rows.forEach(r => {
          counts[r.level]++;
          if (r.level !== "excluded") {
            pctSum += r.percent;
            counted++;
          }
        });
        const avg = counted > 0 ? Math.round(pctSum / counted) : 0;
        return { ...counts, avg, total: rows.length, counted };
      }, [rows]);

      return (
        <div>
          <FilterBarSimple
            search={search}
            onSearch={setSearch}
            filters={filters}
            onToggleFilter={(k) => setFilters(prev => ({ ...prev, [k]: !prev[k] }))}
            chips={[
              { key: "shortStay", label: "短期のみ" },
              { key: "unmetOnly",  label: "未達成のみ（注意+警告）" },
            ]}
          />
          <div className="matrix-wrap">
            <table className="achievement-table">
              <thead>
                <tr>
                  <th>部屋</th>
                  <th>利用者</th>
                  <th style={{ textAlign: "center" }}>入浴回数</th>
                  <th>達成率（目標 {goal} 回 ＝ 週{goalPerWeek}回 × {weeksThisMonth}週）</th>
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 ? (
                  <tr><td colSpan={4} className="matrix-empty">該当する利用者がいません</td></tr>
                ) : rows.map(row => {
                  const isExcluded = row.level === "excluded";
                  const widthPct = isExcluded ? 0 : Math.min(100, row.percent);
                  return (
                    <tr key={row.resident.id}>
                      <td className="col-room">{row.resident.部屋番号}</td>
                      <td className="col-name">
                        {row.resident.区分 === "短期" && <span className="short-mark">短</span>}
                        {isExcluded && <span className="excluded-mark">除外</span>}
                        {row.resident.名前}
                      </td>
                      <td className="col-count">{row.count} 回</td>
                      <td className="col-bar">
                        {isExcluded ? (
                          <div className="achievement-bar-row">
                            <span className="achievement-excluded">目標除外{row.resident.目標除外理由 ? `（${row.resident.目標除外理由}）` : ""}</span>
                          </div>
                        ) : (
                          <div className="achievement-bar-row">
                            <div className="achievement-bar-track">
                              <div
                                className={`achievement-bar-fill lv-${row.level}`}
                                style={{ width: `${widthPct}%` }}
                              />
                            </div>
                            <div className={`achievement-percent lv-${row.level}`}>
                              {row.level === "good" && <span className="check-mark">✓</span>}
                              {(row.level === "attention" || row.level === "warn") && <span className="warn-triangle" />}
                              {row.percent}%
                            </div>
                          </div>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="achievement-summary">
            <span className="achievement-summary-item">達成 (100%+) <strong>{summary.good}</strong>名</span>
            <span className="achievement-summary-item">標準 (50–99%) <strong>{summary.mid}</strong>名</span>
            <span className="achievement-summary-item">注意 (33–49%) <strong>{summary.attention}</strong>名</span>
            <span className="achievement-summary-item">警告 (&lt;33%) <strong>{summary.warn}</strong>名</span>
            {summary.excluded > 0 && (
              <span className="achievement-summary-item">目標除外 <strong>{summary.excluded}</strong>名</span>
            )}
            <span className="achievement-summary-item">月平均達成率 <strong>{summary.avg}%</strong></span>
          </div>
        </div>
      );
    }

    /* 半年・年ビュー（月達成率を横並び） */
    function PeriodGridView({ data, monthStart, monthCount }) {
      const months = useMemo(
        () => monthStartsRange(monthStart, monthCount),
        [monthStart, monthCount]
      );
      const goalPerWeek = data.settings.入浴目標.週 || 3;

      const [filters, setFilters] = useState({ shortStay: false, unmetOnly: false });
      const [search, setSearch] = useState("");

      const rows = useMemo(() => {
        let list = data.residents.filter(r => r.在籍中);
        if (filters.shortStay) list = list.filter(r => r.区分 === "短期");
        if (search.trim()) {
          const q = search.trim();
          list = list.filter(r =>
            r.名前.includes(q) || (r.フリガナ || "").includes(q) || (r.部屋番号 || "").includes(q)
          );
        }
        list = [...list].sort(sortByRoom);
        return list.map(r => {
          const monthly = months.map(m => computeMonthAchievement(data.bathPlans, r, m, goalPerWeek));
          // 除外利用者は期間平均も null（表示「—」）
          if (isResidentExcluded(r)) {
            return { resident: r, monthly, avg: null, level: "excluded" };
          }
          const validMonths = monthly.filter(x => x.percent != null);
          const avg = validMonths.length > 0
            ? Math.round(validMonths.reduce((a, b) => a + b.percent, 0) / validMonths.length)
            : 0;
          const level = achievementLevel(avg);
          return { resident: r, monthly, avg, level };
        });
      }, [data.residents, data.bathPlans, months, goalPerWeek, filters, search]);

      const filtered = useMemo(() => {
        if (!filters.unmetOnly) return rows;
        return rows.filter(r => r.level === "warn" || r.level === "attention");
      }, [rows, filters.unmetOnly]);

      return (
        <div>
          <FilterBarSimple
            search={search}
            onSearch={setSearch}
            filters={filters}
            onToggleFilter={(k) => setFilters(prev => ({ ...prev, [k]: !prev[k] }))}
            chips={[
              { key: "shortStay", label: "短期のみ" },
              { key: "unmetOnly",  label: "未達成のみ（注意+警告）" },
            ]}
          />
          <div className="matrix-wrap">
            <table className="period-grid-table">
              <thead>
                <tr>
                  <th className="col-room">部屋</th>
                  <th className="col-name">利用者</th>
                  {months.map((m, i) => (
                    <th key={i}>{m.getFullYear()}年<br />{m.getMonth() + 1}月</th>
                  ))}
                  <th>期間平均</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan={months.length + 3} className="matrix-empty">該当する利用者がいません</td></tr>
                ) : filtered.map(row => (
                  <tr key={row.resident.id}>
                    <td className="col-room">{row.resident.部屋番号}</td>
                    <td className="col-name">
                      {row.resident.区分 === "短期" && <span className="short-mark">短</span>}
                      {row.level === "excluded" && <span className="excluded-mark">除外</span>}
                      {row.resident.名前}
                    </td>
                    {row.monthly.map((m, i) => {
                      const isEmpty = m.count === 0;
                      return (
                        <td key={i} className={`col-month lv-${m.level} ${isEmpty && m.level !== "excluded" ? "is-empty" : ""}`}>
                          {m.percent == null ? "—" : `${m.percent}%`}
                        </td>
                      );
                    })}
                    <td className={`col-total lv-${row.level}`}>
                      {row.avg == null ? "—" : `${row.avg}%`}

                  </tr>
                ))}
              </tbody>
            </table>
          </div>

      );

    /* ============================================================
       JSONバックアップ・復元
       ============================================================ */

    const BACKUP_VERSION = "1.0.0";

    /** ブラウザでのファイルダウンロード（iPad Safari file:// 対応） */
    const triggerDownload = (blob, filename) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      // Safari は body に append しないと一部環境で発火しない
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // メモリ解放（少し遅らせる）
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    /** state を JSONバックアップオブジェクトにする */
    const buildBackup = (data) => ({
      app: "ofurocho",
      version: BACKUP_VERSION,
      exportedAt: new Date().toISOString(),
      data: {
        residents:    data.residents,
        staff:        data.staff,
        bathPlans:    data.bathPlans,
        sessionTeams: data.sessionTeams,
        settings:     data.settings,
      },
    });

    /** バックアップ JSON の妥当性チェック */
    const validateBackup = (parsed) => {
      if (!parsed || typeof parsed !== "object") return "JSON が読み込めませんでした。";
      if (!parsed.data || typeof parsed.data !== "object") return "data フィールドがありません。";
      const d = parsed.data;
      const has = (k) => Array.isArray(d[k]) || (typeof d[k] === "object" && d[k] !== null);
      // residents/staff/bathPlans/sessionTeams のいずれかがあれば受理
      if (!(has("residents") || has("staff") || has("bathPlans") || has("sessionTeams"))) {
        return "復元できるデータが含まれていません。";
      }
      return null; // OK
    };

    /** Excel取り込み：シートを行配列に */
    const sheetToRows = (sheet) => {
      // header: 1 行目をヘッダ扱い、残り行をオブジェクト化
      return XLSX.utils.sheet_to_json(sheet, { defval: "" });
    };

    /** 利用者シートを Resident[] に変換（必須カラム検証付き） */
    const parseResidentsSheet = (rows) => {
      const required = ["部屋番号", "名前"];
      if (rows.length > 0) {
        const cols = Object.keys(rows[0]);
        for (const r of required) {
          if (!cols.includes(r)) throw new Error(`利用者シート: 必須列「${r}」がありません`);
        }
      }
      return rows.map((row, idx) => ({
        id: `r-${String(idx + 1).padStart(3, "0")}`,
        名前: String(row["名前"] || "").trim(),
        フリガナ: String(row["フリガナ"] || "").trim(),
        部屋番号: String(row["部屋番号"] || "").trim(),
        区分: (String(row["区分"] || "通常").trim() === "短期") ? "短期" : "通常",
        入所日: String(row["入所日"] || "").trim() || null,
        在籍中: true,
        備考: String(row["備考"] || "").trim(),
      })).filter(r => r.名前);
    };

    /** スタッフシートを Staff[] に変換（必須カラム検証付き） */
    const parseStaffSheet = (rows) => {
      const required = ["名前", "職種"];
      if (rows.length > 0) {
        const cols = Object.keys(rows[0]);
        for (const r of required) {
          if (!cols.includes(r)) throw new Error(`スタッフシート: 必須列「${r}」がありません`);
        }
      }
      const validNurseRoles = new Set(["入浴介助", "処置", "外回り"]);
      const validCareRoles  = new Set(["入浴介助", "更衣", "外回り"]);
      return rows.map((row, idx) => {
        const 名前 = String(row["名前"] || "").trim();
        const rawJob = String(row["職種"] || "").trim();
        const 職種 = (rawJob === "支援員") ? "支援員" : "看護師";
        const validRoles = (職種 === "看護師") ? validNurseRoles : validCareRoles;
        const subRolesStr = String(row["サブ役割"] || row["サブロール"] || "").trim();
        const サブ役割 = subRolesStr
          .split(/[,、，\s]+/)
          .map(s => s.trim())
          .filter(s => validRoles.has(s));
        return {
          id: `s-${String(idx + 1).padStart(3, "0")}`,
          名前,
          職種,
          サブ役割,
          在籍中: true,
        };
      }).filter(s => s.名前);
    };

    /** 取り込み書式のサンプルExcelを生成してダウンロード */
    const downloadSampleXlsx = () => {
      const residentsAoa = [
        ["部屋番号", "名前", "フリガナ", "区分", "入所日", "備考"],
        ["さくら",   "山田 太郎",   "ヤマダ タロウ",   "通常", "2025-04-01", ""],
        ["すみれ",   "佐藤 静子",   "サトウ シズコ",   "通常", "2024-09-15", ""],
        ["ばら",     "鈴木 和夫",   "スズキ カズオ",   "通常", "2025-12-10", ""],
        ["ひまわり", "高橋 美智子", "タカハシ ミチコ", "通常", "2025-06-20", ""],
        ["カサブランカ", "田中 敏子", "タナカ トシコ", "短期", "2026-05-01", "お試し2週間"],
      ];
      const staffAoa = [
        ["名前", "職種", "サブ役割"],
        ["田中 和子", "看護師", "入浴介助, 処置, 外回り"],
        ["佐藤 雅彦", "看護師", "入浴介助, 処置, 外回り"],
        ["伊藤 節子", "看護師", "処置, 外回り"],
        ["山本 幸子", "支援員", "入浴介助, 更衣, 外回り"],
        ["鈴木 三郎", "支援員", "入浴介助, 更衣, 外回り"],
        ["木村 ハル", "支援員", "更衣"],
        ["加藤 ミチ", "支援員", "入浴介助, 外回り"],
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(residentsAoa), "利用者");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(staffAoa), "スタッフ");
      try {
        XLSX.writeFile(wb, "ofurocho_書式サンプル.xlsx");
      } catch (e) {
        console.error(e);
        window.alert("ダウンロードに失敗しました：" + e.message);
      }
    };

    /** Excelファイルから residents / staff を抽出（シート名で判定） */
    const parseImportFile = async (file) => {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const findSheet = (...names) => {
        for (const n of names) {
          if (wb.SheetNames.includes(n)) return wb.Sheets[n];
        }
        return null;
      };
      const result = {};
      const residentsSheet = findSheet("利用者", "residents", "Residents");
      if (residentsSheet) {
        result.residents = parseResidentsSheet(sheetToRows(residentsSheet));
      }
      const staffSheet = findSheet("スタッフ", "staff", "Staff");
      if (staffSheet) {
        result.staff = parseStaffSheet(sheetToRows(staffSheet));
      }
      if (!result.residents && !result.staff) {
        throw new Error('シート「利用者」または「スタッフ」が見つかりません');
      }
      return result;
    };

    /* ============================================================
       Excel出力（SheetJS）
       ============================================================ */

    /** 安全なファイル名にする */
    const sanitizeFilename = (s) => (s || "").replace(/[\\/:*?"<>|]/g, "");

    /** Excelダウンロード共通 */
    const downloadXlsx = (workbook, filename) => {
      try {
        XLSX.writeFile(workbook, filename);
      } catch (e) {
        console.error("[xlsx]", e);
        window.alert("Excel出力に失敗しました。\n" + e.message);
      }
    };

    /** 週マトリクスをExcel化 */
    const exportWeekToXlsx = ({ residents, bathPlans, weekStart, settings }) => {
      const days = weekDays(weekStart);
      const fromStr = ymd(days[0]);
      const toStr   = ymd(days[days.length - 1]);
      const aggMap = aggregateBathByResident(bathPlans, fromStr, toStr);
      const aoa = [
        ["部屋", "利用者", "区分", ...days.map(d => `${weekdayShort(d)} ${mmdd(d)}`), "週計"],
      ];
      const sortedResidents = [...residents.filter(r => r.在籍中)].sort(sortByRoom);
      sortedResidents.forEach(r => {
        const plans = aggMap.get(r.id) || [];
        const byDay = new Map();
        plans.forEach(p => {
          if (!byDay.has(p.日付)) byDay.set(p.日付, []);
          byDay.get(p.日付).push(p.セッション === "AM" ? "朝" : "午");
        });
        const cells = days.map(d => (byDay.get(ymd(d)) || []).join(",") || "");
        aoa.push([r.部屋番号, r.名前, r.区分, ...cells, plans.length]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const wb = XLSX.utils.book_new();
      const facility = sanitizeFilename(settings.施設名 || "ofurocho");
      XLSX.utils.book_append_sheet(wb, ws, `週 ${fromStr.replace(/-/g,"")}`);
      downloadXlsx(wb, `${facility}_入浴記録_週${fromStr}_${toStr}.xlsx`);
    };

    /** 月達成率をExcel化 */
    const exportMonthToXlsx = ({ residents, bathPlans, monthStart, settings }) => {
      const goalPerWeek = settings.入浴目標.週 || 3;
      const aoa = [
        ["部屋", "利用者", "区分", "入浴回数", `目標（週${goalPerWeek}回×${weeksInMonth(monthStart)}週）`, "達成率(%)", "備考"],
      ];
      const sortedResidents = [...residents.filter(r => r.在籍中)].sort(sortByRoom);
      sortedResidents.forEach(r => {
        const m = computeMonthAchievement(bathPlans, r, monthStart, goalPerWeek);
        const note = isResidentExcluded(r) ? `目標除外${r.目標除外理由 ? `（${r.目標除外理由}）` : ""}` : "";
        aoa.push([r.部屋番号, r.名前, r.区分, m.count, m.goal ?? "—", m.percent ?? "—", note]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const wb = XLSX.utils.book_new();
      const facility = sanitizeFilename(settings.施設名 || "ofurocho");
      const ym = `${monthStart.getFullYear()}-${String(monthStart.getMonth() + 1).padStart(2, "0")}`;
      XLSX.utils.book_append_sheet(wb, ws, `月 ${ym}`);
      downloadXlsx(wb, `${facility}_入浴達成率_月${ym}.xlsx`);
    };

    /** 半年/年達成率をExcel化 */
    const exportPeriodToXlsx = ({ residents, bathPlans, monthStart, monthCount, settings, periodLabel }) => {
      const goalPerWeek = settings.入浴目標.週 || 3;
      const months = monthStartsRange(monthStart, monthCount);
      const header = ["部屋", "利用者", "区分", ...months.map(m => `${m.getFullYear()}/${m.getMonth() + 1}`), "期間平均(%)"];
      const aoa = [header];
      const sortedResidents = [...residents.filter(r => r.在籍中)].sort(sortByRoom);
      sortedResidents.forEach(r => {
        const monthly = months.map(m => computeMonthAchievement(bathPlans, r, m, goalPerWeek));
        if (isResidentExcluded(r)) {
          aoa.push([r.部屋番号, r.名前, r.区分, ...monthly.map(() => "—"), "—"]);
        } else {
          const valid = monthly.filter(m => m.percent != null);
          const avg = valid.length > 0 ? Math.round(valid.reduce((a, b) => a + b.percent, 0) / valid.length) : 0;
          aoa.push([r.部屋番号, r.名前, r.区分, ...monthly.map(m => m.percent ?? "—"), avg]);
        }
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const wb = XLSX.utils.book_new();
      const facility = sanitizeFilename(settings.施設名 || "ofurocho");
      const startStr = `${monthStart.getFullYear()}-${String(monthStart.getMonth() + 1).padStart(2, "0")}`;
      XLSX.utils.book_append_sheet(wb, ws, `${periodLabel} ${startStr}`);
      downloadXlsx(wb, `${facility}_入浴達成率_${periodLabel}${startStr}.xlsx`);
    };

    /* スタッフ業務量ビュー */
    function StaffWorkloadView({ data, monthStart }) {
      const monthEndDate = new Date(monthStart);
      monthEndDate.setMonth(monthEndDate.getMonth() + 1);
      monthEndDate.setDate(0);
      const fromStr = ymd(monthStart);
      const toStr   = ymd(monthEndDate);

      const [filters, setFilters] = useState({ nurses: true, care: true });
      const [sortKey, setSortKey] = useState("入浴介助");
      const [search, setSearch] = useState("");

      const counts = useMemo(
        () => computeStaffWorkload(data.bathPlans, data.sessionTeams, fromStr, toStr),
        [data.bathPlans, data.sessionTeams, fromStr, toStr]
      );

      const rows = useMemo(() => {
        let list = data.staff.filter(s => s.在籍中);
        if (!filters.nurses) list = list.filter(s => s.職種 !== "看護師");
        if (!filters.care)   list = list.filter(s => s.職種 !== "支援員");
        if (search.trim()) {
          const q = search.trim();
          list = list.filter(s => s.名前.includes(q));
        }
        const enriched = list.map(s => {
          const c = counts.get(s.id) || { 入浴介助: 0, 処置: 0, 更衣: 0, 外回り: 0, 合計: 0 };
          return { staff: s, ...c };
        });
        // ソート
        enriched.sort((a, b) => {
          if (sortKey === "name") return (a.staff.名前 || "").localeCompare(b.staff.名前 || "", "ja");
          return (b[sortKey] || 0) - (a[sortKey] || 0);
        });
        return enriched;
      }, [data.staff, counts, filters, search, sortKey]);

      const totals = useMemo(() => {
        const t = { 入浴介助: 0, 処置: 0, 更衣: 0, 外回り: 0, 合計: 0 };
        rows.forEach(r => {
          t.入浴介助 += r.入浴介助;
          t.処置 += r.処置;
          t.更衣 += r.更衣;
          t.外回り += r.外回り;
          t.合計 += r.合計;
        });
        return t;
      }, [rows]);

      return (
        <div>
          <div className="filter-bar">
            <input
              type="search"
              className="filter-search"
              placeholder="名前で検索"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
            <div className="filter-group">
              <span>並び</span>
              <select
                className="filter-select"
                value={sortKey}
                onChange={(e) => setSortKey(e.target.value)}
              >
                <option value="入浴介助">入浴介助 多い順</option>
                <option value="処置">処置 多い順</option>
                <option value="更衣">更衣 多い順</option>
                <option value="外回り">外回り 多い順</option>
                <option value="合計">合計 多い順</option>
                <option value="name">名前順</option>
              </select>
            </div>
            <label className={`filter-chip ${filters.nurses ? "is-active" : ""}`}>
              <input type="checkbox" checked={filters.nurses} onChange={() => setFilters(p => ({ ...p, nurses: !p.nurses }))} />
              看護師
            </label>
            <label className={`filter-chip ${filters.care ? "is-active" : ""}`}>
              <input type="checkbox" checked={filters.care} onChange={() => setFilters(p => ({ ...p, care: !p.care }))} />
              支援員
            </label>
          </div>
          <div className="matrix-wrap">
            <table className="achievement-table">
              <thead>
                <tr>
                  <th>名前</th>
                  <th style={{ width: 64 }}>職種</th>
                  <th style={{ textAlign: "center", width: 80 }}>入浴介助</th>
                  <th style={{ textAlign: "center", width: 60 }}>処置</th>
                  <th style={{ textAlign: "center", width: 60 }}>更衣</th>
                  <th style={{ textAlign: "center", width: 60 }}>外回り</th>
                  <th style={{ textAlign: "center", width: 60 }}>合計</th>
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 ? (
                  <tr><td colSpan={7} className="matrix-empty">該当するスタッフはいません</td></tr>
                ) : rows.map(r => (
                  <tr key={r.staff.id}>
                    <td>{r.staff.名前}</td>
                    <td style={{ fontSize: 12, color: "var(--text-soft)" }}>
                      {r.staff.職種 === "看護師" ? "看護師" : "支援員"}
                    </td>
                    <td style={{ textAlign: "center" }}>{r.入浴介助 || "—"}</td>
                    <td style={{ textAlign: "center" }}>{r.処置 || "—"}</td>
                    <td style={{ textAlign: "center" }}>{r.更衣 || "—"}</td>
                    <td style={{ textAlign: "center" }}>{r.外回り || "—"}</td>
                    <td style={{ textAlign: "center", fontWeight: 500 }}>{r.合計}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr>
                  <td colSpan={2}>期間合計</td>
                  <td style={{ textAlign: "center" }}>{totals.入浴介助}</td>
                  <td style={{ textAlign: "center" }}>{totals.処置}</td>
                  <td style={{ textAlign: "center" }}>{totals.更衣}</td>
                  <td style={{ textAlign: "center" }}>{totals.外回り}</td>
                  <td style={{ textAlign: "center", fontWeight: 500 }}>{totals.合計}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      );
    }

    /** スタッフ業務量をExcel化 */
    const exportStaffWorkloadToXlsx = ({ staff, bathPlans, sessionTeams, monthStart, settings }) => {
      const monthEndDate = new Date(monthStart);
      monthEndDate.setMonth(monthEndDate.getMonth() + 1);
      monthEndDate.setDate(0);
      const fromStr = ymd(monthStart);
      const toStr   = ymd(monthEndDate);
      const counts = computeStaffWorkload(bathPlans, sessionTeams, fromStr, toStr);
      const aoa = [
        ["名前", "職種", "入浴介助", "処置", "更衣", "外回り", "合計"],
      ];
      const sortedStaff = [...staff.filter(s => s.在籍中)].sort((a, b) => {
        const ca = counts.get(a.id)?.合計 || 0;
        const cb = counts.get(b.id)?.合計 || 0;
        return cb - ca;
      });
      sortedStaff.forEach(s => {
        const c = counts.get(s.id) || { 入浴介助: 0, 処置: 0, 更衣: 0, 外回り: 0, 合計: 0 };
        aoa.push([s.名前, s.職種, c.入浴介助, c.処置, c.更衣, c.外回り, c.合計]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const wb = XLSX.utils.book_new();
      const facility = sanitizeFilename(settings.施設名 || "ofurocho");
      const ym = `${monthStart.getFullYear()}-${String(monthStart.getMonth() + 1).padStart(2, "0")}`;
      XLSX.utils.book_append_sheet(wb, ws, `スタッフ業務量 ${ym}`);
      downloadXlsx(wb, `${facility}_スタッフ業務量_月${ym}.xlsx`);
    };

    /* 記録一覧タブ */
    function ListTab({ data, today }) {
      const [personView, setPersonView] = useState("resident"); // "resident" | "staff"
      const [view, setView] = useState("week"); // "week" | "month" | "half" | "year"
      const [weekStart, setWeekStart] = useState(() => startOfWeek(today));
      const [monthStart, setMonthStart] = useState(() => startOfMonth(today));
      // 半年は monthStart から 6ヶ月、年は 12ヶ月。半年/年の開始月は専用stateで持つ
      const [periodStart, setPeriodStart] = useState(() => {
        const d = startOfMonth(today);
        d.setMonth(d.getMonth() - 5); // 半年なら6ヶ月分（今月含む）
        return d;
      });
      const [yearStart, setYearStart] = useState(() => {
        const d = startOfMonth(today);
        d.setMonth(d.getMonth() - 11);
        return d;
      });

      const weekLabel = useMemo(() => {
        const end = new Date(weekStart);
        end.setDate(end.getDate() + 4);
        return `${mmdd(weekStart)} 〜 ${mmdd(end)}`;
      }, [weekStart]);

      const monthLabel = useMemo(() => {
        return `${monthStart.getFullYear()}年${monthStart.getMonth() + 1}月`;
      }, [monthStart]);

      const halfLabel = useMemo(() => {
        const end = new Date(periodStart);
        end.setMonth(end.getMonth() + 5);
        return `${periodStart.getFullYear()}年${periodStart.getMonth() + 1}月 〜 ${end.getFullYear()}年${end.getMonth() + 1}月`;
      }, [periodStart]);

      const yearLabel = useMemo(() => {
        const end = new Date(yearStart);
        end.setMonth(end.getMonth() + 11);
        return `${yearStart.getFullYear()}年${yearStart.getMonth() + 1}月 〜 ${end.getFullYear()}年${end.getMonth() + 1}月`;
      }, [yearStart]);

      const handlePrev = useCallback(() => {
        if (view === "week") {
          const d = new Date(weekStart); d.setDate(d.getDate() - 7); setWeekStart(d);
        } else if (view === "month") {
          const d = new Date(monthStart); d.setMonth(d.getMonth() - 1); setMonthStart(d);
        } else if (view === "half") {
          const d = new Date(periodStart); d.setMonth(d.getMonth() - 6); setPeriodStart(d);
        } else if (view === "year") {
          const d = new Date(yearStart); d.setMonth(d.getMonth() - 12); setYearStart(d);
        }
      }, [view, weekStart, monthStart, periodStart, yearStart]);
      const handleNext = useCallback(() => {
        if (view === "week") {
          const d = new Date(weekStart); d.setDate(d.getDate() + 7); setWeekStart(d);
        } else if (view === "month") {
          const d = new Date(monthStart); d.setMonth(d.getMonth() + 1); setMonthStart(d);
        } else if (view === "half") {
          const d = new Date(periodStart); d.setMonth(d.getMonth() + 6); setPeriodStart(d);
        } else if (view === "year") {
          const d = new Date(yearStart); d.setMonth(d.getMonth() + 12); setYearStart(d);
        }
      }, [view, weekStart, monthStart, periodStart, yearStart]);

      // キーボードショートカット：←→で前後の期間
      useEffect(() => {
        const onKey = (e) => {
          // フォーカスが入力要素にある時はスキップ
          const tag = (e.target?.tagName || "").toLowerCase();
          if (tag === "input" || tag === "textarea" || tag === "select") return;
          // モーダルが開いている時はスキップ
          if (document.querySelector(".modal-overlay")) return;
          if (e.key === "ArrowLeft")  { handlePrev(); }
          if (e.key === "ArrowRight") { handleNext(); }
        };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [handlePrev, handleNext]);
      const handleJumpToday = () => {
        if (view === "week") setWeekStart(startOfWeek(today));
        else if (view === "month") setMonthStart(startOfMonth(today));
        else if (view === "half") {
          const d = startOfMonth(today); d.setMonth(d.getMonth() - 5); setPeriodStart(d);
        } else if (view === "year") {
          const d = startOfMonth(today); d.setMonth(d.getMonth() - 11); setYearStart(d);
        }
      };

      const handleExport = () => {
        if (personView === "staff") {
          exportStaffWorkloadToXlsx({
            staff: data.staff,
            bathPlans: data.bathPlans,
            sessionTeams: data.sessionTeams,
            monthStart,
            settings: data.settings,
          });
          return;
        }
        const args = { residents: data.residents, bathPlans: data.bathPlans, settings: data.settings };
        if (view === "week") exportWeekToXlsx({ ...args, weekStart });
        else if (view === "month") exportMonthToXlsx({ ...args, monthStart });
        else if (view === "half") exportPeriodToXlsx({ ...args, monthStart: periodStart, monthCount: 6, periodLabel: "半年" });
        else if (view === "year") exportPeriodToXlsx({ ...args, monthStart: yearStart, monthCount: 12, periodLabel: "年" });
      };

      const handlePrint = () => {
        // 半年/年は印刷時に横向き
        const wantsLandscape = (view === "half" || view === "year");
        const root = document.querySelector(".app");
        if (wantsLandscape) root?.classList.add("print-orient-landscape");
        setTimeout(() => {
          window.print();
          setTimeout(() => {
            if (wantsLandscape) root?.classList.remove("print-orient-landscape");
          }, 50);
        }, 50);
      };

      const printTitle = useMemo(() => {
        if (personView === "staff") return `${monthLabel} スタッフ業務量レポート`;
        if (view === "week")  return "入浴記録（週）";
        if (view === "month") return `${monthLabel} 入浴達成率レポート`;
        if (view === "half")  return `${halfLabel} 入浴達成率レポート（半年）`;
        return `${yearLabel} 入浴達成率レポート（年）`;
      }, [personView, view, monthLabel, halfLabel, yearLabel]);

      const printSubtitle = useMemo(() => {
        if (personView === "resident" && view === "week") return weekLabel;
        return null;
      }, [personView, view, weekLabel]);

      const periodLabelForCurrent = personView === "staff"
        ? monthLabel
        : (view === "week" ? weekLabel : view === "month" ? monthLabel : view === "half" ? halfLabel : yearLabel);

      const handleStaffPrev = () => {
        const d = new Date(monthStart); d.setMonth(d.getMonth() - 1); setMonthStart(d);
      };
      const handleStaffNext = () => {
        const d = new Date(monthStart); d.setMonth(d.getMonth() + 1); setMonthStart(d);
      };
      const handleStaffJumpToday = () => {
        setMonthStart(startOfMonth(today));
      };

      return (
        <div>
          <PrintableReportHeader
            title={printTitle}
            subtitle={printSubtitle}
            settings={data.settings}
          />
          <div className="list-toolbar no-print">
            <ViewSwitch
              view={personView}
              onChange={setPersonView}
              options={[
                { value: "resident", label: "利用者別" },
                { value: "staff",    label: "スタッフ別" },
              ]}
            />
          </div>
          <div className="list-toolbar no-print">
            {personView === "resident" && (
              <ViewSwitch
                view={view}
                onChange={setView}
                options={[
                  { value: "week",  label: "週" },
                  { value: "month", label: "月" },
                  { value: "half",  label: "半年" },
                  { value: "year",  label: "年" },
                ]}
              />
            )}
            {personView === "staff" ? (
              <PeriodNav
                label={monthLabel}
                onPrev={handleStaffPrev}
                onNext={handleStaffNext}
                onJumpToday={handleStaffJumpToday}
              />
            ) : (
              <PeriodNav
                label={periodLabelForCurrent}
                onPrev={handlePrev}
                onNext={handleNext}
                onJumpToday={handleJumpToday}
              />
            )}
            <button type="button" className="excel-button" onClick={handlePrint}>
              🖨 印刷
            </button>
            <button type="button" className="excel-button" onClick={handleExport}>
              📊 Excelで出力
            </button>
          </div>

    function DataManagementSection({ data, onImport, onRestore, onBackup, onRestoreFromSnapshot }) {
      const importInputRef = React.useRef(null);
      const restoreInputRef = React.useRef(null);
      const [importDragOver, setImportDragOver] = useState(false);
      const [restoreDragOver, setRestoreDragOver] = useState(false);

      // アプリ内スナップショットの有無と日時
      const snapshot = useMemo(() => storage.get(KEYS.backupSnapshot, null), [data]);
      const snapshotLabel = snapshot?.exportedAt
        ? new Date(snapshot.exportedAt).toLocaleString("ja-JP")
        : null;

      const processImportFile = async (file) => {
        try {
          const parsed = await parseImportFile(file);
          const summary = [
            parsed.residents ? `利用者 ${parsed.residents.length}名` : null,
            parsed.staff     ? `スタッフ ${parsed.staff.length}名`   : null,
          ].filter(Boolean).join(" ／ ");
          if (!window.confirm(`次のデータを読み込みます：\n${summary}\n\n既存の利用者・スタッフは置き換えられます。続けますか？`)) return;
          onImport(parsed);
          window.alert("取り込みが完了しました。");
        } catch (err) {
          console.error(err);
          window.alert(`取り込み失敗：${err.message}`);
        }
      };

      const processRestoreFile = async (file) => {
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const err = validateBackup(parsed);
          if (err) { window.alert(`復元失敗：${err}`); return; }
          if (!window.confirm("現在のすべてのデータがバックアップ内容で上書きされます。よろしいですか？")) return;
          onRestore(parsed.data);
          window.alert("復元が完了しました。ページを再読み込みします。");
          window.location.reload();
        } catch (err) {
          console.error(err);
          window.alert(`復元失敗：JSONの読み込みに失敗しました\n${err.message}`);
        }
      };

      const handleImportFile = async (e) => {
        const file = e.target.files?.[0];
        e.target.value = "";
        if (file) await processImportFile(file);
      };

      const handleRestoreFile = async (e) => {
        const file = e.target.files?.[0];
        e.target.value = "";
        if (file) await processRestoreFile(file);
      };

      // ドラッグ&ドロップ
      const onImportDragOver = (e) => { e.preventDefault(); setImportDragOver(true); };
      const onImportDragLeave = () => setImportDragOver(false);
      const onImportDrop = async (e) => {
        e.preventDefault();
        setImportDragOver(false);
        const file = e.dataTransfer.files?.[0];
        if (!file) return;
        if (!/\.(xlsx|xls)$/i.test(file.name)) {
          window.alert("Excelファイル（.xlsx または .xls）をドロップしてください。");
          return;
        }
        await processImportFile(file);
      };
      const onRestoreDragOver = (e) => { e.preventDefault(); setRestoreDragOver(true); };
      const onRestoreDragLeave = () => setRestoreDragOver(false);
      const onRestoreDrop = async (e) => {
        e.preventDefault();
        setRestoreDragOver(false);
        const file = e.dataTransfer.files?.[0];
        if (!file) return;
        if (!/\.json$/i.test(file.name)) {
          window.alert("JSONファイル（.json）をドロップしてください。");
          return;
        }
        await processRestoreFile(file);
      };

      return (
        <section className="settings-section">
          <h2 className="settings-section-title">
            データ管理
            <span className="settings-section-meta">月初のExcel取り込み／日次のJSONバックアップを推奨</span>
          </h2>
          <div className="data-grid">
            <div className="data-card is-primary">
              <h3 className="data-card-title">📥 入浴記録をバックアップ</h3>
              <p className="data-card-body">
                すべての記録・体制・設定を JSONファイルでダウンロードします。
                <br />毎日の終業時に取ることを推奨。
              </p>
              <button type="button" className="data-card-action is-primary" onClick={onBackup}>
                JSONをダウンロード
              </button>
            </div>

            <div
              className={`data-card ${importDragOver ? "is-drag-over" : ""}`}
              onDragOver={onImportDragOver}
              onDragLeave={onImportDragLeave}
              onDrop={onImportDrop}
            >
              <h3 className="data-card-title">📋 利用者・スタッフを取り込み</h3>
              <p className="data-card-body">
                {importDragOver ? (
                  <strong>ここにドロップして取り込み</strong>
                ) : (
                  <>
                    Excelファイル（.xlsx）からシート「利用者」「スタッフ」を読み込みます。
                    <br />既存の利用者・スタッフは置き換わりますが、入浴記録は残ります。
                    <br />初回は<strong>書式サンプル</strong>をダウンロードして、中身を施設のデータに置き換えてください。
                    <br />💡 ファイルを<strong>ここにドラッグ&ドロップ</strong>することもできます。
                  </>
                )}
              </p>
              <input
                ref={importInputRef}
                type="file"
                accept=".xlsx,.xls"
                style={{ display: "none" }}
                onChange={handleImportFile}
              />
              <button type="button" className="data-card-action" onClick={() => importInputRef.current?.click()}>
                ファイルを選択
              </button>
              <button type="button" className="data-card-action" onClick={downloadSampleXlsx}>
                📑 書式サンプルをダウンロード
              </button>
            </div>

            <div
              className={`data-card is-danger ${restoreDragOver ? "is-drag-over" : ""}`}
              onDragOver={onRestoreDragOver}
              onDragLeave={onRestoreDragLeave}
              onDrop={onRestoreDrop}
            >
              <h3 className="data-card-title">📤 バックアップから復元</h3>
              <p className="data-card-body">
                {restoreDragOver ? (
                  <strong>ここにドロップして復元</strong>
                ) : snapshotLabel ? (
                  <>直近のバックアップ（<strong>{snapshotLabel}</strong>）に戻すか、ダウンロード済みの JSON ファイルから復元します。<br />💡 JSONを<strong>ここにドラッグ&ドロップ</strong>でも復元できます。</>
                ) : (
                  <>JSONバックアップを読み込んで現在のデータを上書きします。先にバックアップを取ると、ここから直接戻せるようになります。<br />💡 JSONを<strong>ここにドラッグ&ドロップ</strong>でも復元できます。</>
                )}
                <br />取り消せない操作です。
              </p>
              <input
                ref={restoreInputRef}
                type="file"
                accept=".json,application/json"
                style={{ display: "none" }}
                onChange={handleRestoreFile}
              />
              {snapshotLabel && (
                <button type="button" className="data-card-action is-danger" onClick={onRestoreFromSnapshot}>
                  直近のバックアップから戻す
                </button>
              )}
              <button type="button" className="data-card-action" onClick={() => restoreInputRef.current?.click()}>
                JSONファイルから復元
              </button>
            </div>
          </div>
          {data.settings.最終バックアップ && (
            <p className="stat-line" style={{ marginTop: 12 }}>
              最終バックアップ：<strong>{new Date(data.settings.最終バックアップ).toLocaleString("ja-JP")}</strong>
            </p>
          )}
        </section>
      );
    }

    /** 利用者編集モーダル：個別目標・目標除外のみ編集可能 */
    function ResidentEditModal({ open, onClose, target, defaultGoalPerWeek, onSave }) {
      const [goalMode, setGoalMode] = useState("default");
      const [customWeek, setCustomWeek] = useState(2);
      const [excluded, setExcluded] = useState(false);
      const [excludeReason, setExcludeReason] = useState("");

      useEffect(() => {
        if (!open || !target) return;
        if (target.個別目標?.週 != null) {
          setGoalMode("custom");
          setCustomWeek(target.個別目標.週);
        } else {
          setGoalMode("default");
          setCustomWeek(defaultGoalPerWeek || 3);
        }
        setExcluded(!!target.目標除外);
        setExcludeReason(target.目標除外理由 || "");
      }, [open, target, defaultGoalPerWeek]);

      if (!target) return null;

      const handleSave = () => {
        const next = {
          ...target,
          個別目標: (goalMode === "custom") ? { 週: Number(customWeek) || 1 } : null,
          目標除外: excluded,
          目標除外理由: excluded ? excludeReason.trim() : "",
        };
        onSave(next);
        onClose();
      };

      return (
        <Modal
          open={open}
          onClose={onClose}
          title={`利用者の編集 — ${target.名前}`}
          subtitle={`${target.部屋番号} ／ ${target.区分}`}
          footer={
            <>
              <span className="modal-footer-hint">名前・部屋・区分はExcel取り込みから</span>
              <button type="button" className="btn btn-ghost" onClick={onClose}>キャンセル</button>
              <button type="button" className="btn btn-primary" onClick={handleSave}>保存</button>
            </>
          }
        >
          <div className="staff-edit-row">
            <span className="staff-edit-label">個別目標</span>
            <div className="staff-edit-radios">
              <label className="staff-edit-radio">
                <input
                  type="radio"
                  checked={goalMode === "default"}
                  onChange={() => setGoalMode("default")}
                />
                デフォルト(週{defaultGoalPerWeek || 3}回)
              </label>
              <label className="staff-edit-radio">
                <input
                  type="radio"
                  checked={goalMode === "custom"}
                  onChange={() => setGoalMode("custom")}
                />
                週
                <input
                  type="number"
                  min="1"
                  max="7"
                  className="settings-input is-narrow"
                  value={customWeek}
                  onChange={(e) => { setCustomWeek(e.target.value); setGoalMode("custom"); }}
                  style={{ width: 60 }}
                />
                回
              </label>
            </div>
          </div>
          <div className="staff-edit-row">
            <span className="staff-edit-label">目標除外</span>
            <label className="staff-edit-radio">
              <input
                type="checkbox"
                checked={excluded}
                onChange={(e) => setExcluded(e.target.checked)}
              />
              達成率の対象外にする(終末期・医療的禁忌など)
            </label>
          </div>
          {excluded && (
            <div className="staff-edit-row">
              <span className="staff-edit-label">理由</span>
              <input
                type="text"
                className="staff-edit-input"
                placeholder="例：終末期、皮膚状態、本人拒否"
                value={excludeReason}
                onChange={(e) => setExcludeReason(e.target.value)}
              />
            </div>
          )}
        </Modal>
      );

    /* スタッフ管理 */

    const NURSE_ROLES = ["入浴介助", "処置", "外回り"];
    const CARE_ROLES  = ["入浴介助", "更衣", "外回り"];

    function StaffEditModal({ open, onClose, target, onSave }) {
      // target: 編集対象（既存スタッフ）または null（新規追加）
      const [name, setName] = useState("");
      const [job, setJob] = useState("看護師");
      const [roles, setRoles] = useState([]);

      useEffect(() => {
        if (!open) return;
        if (target) {
          setName(target.名前 || "");
          setJob(target.職種 || "看護師");
          setRoles([...(target.サブ役割 || [])]);
        } else {
          // 新規追加：全サブ役割を持てる前提でデフォルトすべてチェック
          setName("");
          setJob("看護師");
          setRoles([...NURSE_ROLES]);
        }
      }, [open, target]);

      const availableRoles = job === "看護師" ? NURSE_ROLES : CARE_ROLES;

      // 職種を切替えた時のみ「新しい職種の全サブ役割をチェック済み」にする
      // （初回マウントの useEffect 経由だと編集時の既存ロールを上書きしてしまうため、
      //  ラジオボタンの onChange ハンドラ側で処理する）
      const handleJobChange = (newJob) => {
        setJob(newJob);
        setRoles(newJob === "看護師" ? [...NURSE_ROLES] : [...CARE_ROLES]);
      };

      const toggleRole = (role) => {
        setRoles(prev => prev.includes(role) ? prev.filter(r => r !== role) : [...prev, role]);
      };

      const canSave = name.trim().length > 0;

      const handleSave = () => {
        if (!canSave) return;
        const next = {
          id: target?.id || `s-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`,
          名前: name.trim(),
          職種: job,
          サブ役割: roles.filter(r => availableRoles.includes(r)),
          在籍中: target?.在籍中 ?? true,
        };
        onSave(next, !!target);
        onClose();
      };

      return (
        <Modal
          open={open}
          onClose={onClose}
          title={target ? "スタッフを編集" : "スタッフを追加"}
          subtitle={target ? `ID: ${target.id}` : "新しいスタッフを登録します"}
          footer={
            <>
              <span className="modal-footer-hint">サブ役割は職種で切り替わります</span>
              <button type="button" className="btn btn-ghost" onClick={onClose}>キャンセル</button>
              <button type="button" className="btn btn-primary" onClick={handleSave} disabled={!canSave}>
                保存
              </button>
            </>
          }
        >
          <div className="staff-edit-row">
            <span className="staff-edit-label">名前</span>
            <input
              type="text"
              className="staff-edit-input"
              value={name}
              onChange={(e) => setName(e.target.value)}
              placeholder="山田 太郎"
            />
          </div>
          <div className="staff-edit-row">
            <span className="staff-edit-label">職種</span>
            <div className="staff-edit-radios">
              <label className="staff-edit-radio">
                <input
                  type="radio"
                  name="job"
                  checked={job === "看護師"}
                  onChange={() => handleJobChange("看護師")}
                />
                看護師
              </label>
              <label className="staff-edit-radio">
                <input
                  type="radio"
                  name="job"
                  checked={job === "支援員"}
                  onChange={() => handleJobChange("支援員")}
                />
                支援員
              </label>
            </div>
          </div>
          <div className="staff-edit-row">
            <span className="staff-edit-label">サブ役割</span>
            <div className="staff-edit-checks">
              {availableRoles.map(r => {
                const checked = roles.includes(r);
                return (
                  <label key={r} className={`role-check ${checked ? "is-checked" : ""}`}>
                    <input
                      type="checkbox"
                      checked={checked}
                      onChange={() => toggleRole(r)}
                    />
                    {checked ? "✓" : "+"} {r}
                  </label>
                );
              })}
            </div>
          </div>
        </Modal>
      );
    }

            <button

              className={`staff-tab ${job === "支援員" ? "is-active" : ""}`}

    /**
     * 単一セッション分の予定表ページ。
     * isLast=false のとき末尾に page-break を入れて次セッションを次ページへ。
     */
    function PrintScheduleSinglePage({ residents, plans, dateStr, session, settings, isLast = true }) {
      const sessionLabel = session === "AM" ? "午前" : "午後";
      const dateLabel = useMemo(() => {
        const [y, m, d] = dateStr.split("-").map(Number);
        const week = ["日", "月", "火", "水", "木", "金", "土"];
        const dow = new Date(y, m - 1, d).getDay();
        return `${y}年${m}月${d}日（${week[dow]}）`;
      }, [dateStr]);

      const residentById = useMemo(
        () => new Map(residents.map(r => [r.id, r])),
        [residents]
      );

      const filteredPlans = useMemo(() => {
        return plans
          .filter(p => p.日付 === dateStr && p.状態 === "予定" && p.セッション === session)
          .map(p => ({ plan: p, resident: residentById.get(p.利用者ID) }))
          .filter(item => item.resident)
          .sort((a, b) => sortByRoom(a.resident, b.resident));
      }, [plans, dateStr, session, residentById]);

      const printedAt = new Date().toLocaleString("ja-JP");

      return (
        <div className={`print-page ${isLast ? "" : "page-break"}`}>
          <div className="print-page-header">
            <div>
              <h1 className="print-title">入浴予定表（{sessionLabel}）</h1>
              <p className="print-subtitle">{dateLabel}</p>
            </div>
            <div className="print-meta">
              <strong>{settings.施設名 || "—"}</strong><br />
              お風呂帖 ／ HITONOWA STUDIO
            </div>
          </div>

          <div className="print-handwrite">
            <div className="print-handwrite-item">
              <span className="print-handwrite-label">担当看護師</span>
              <span className="print-handwrite-line"></span>
            </div>
            <div className="print-handwrite-item">
              <span className="print-handwrite-label">担当支援員</span>
              <span className="print-handwrite-line"></span>
            </div>
          </div>

          <table className="print-schedule-table">
            <thead>
              <tr>
                <th className="col-no">No.</th>
                <th className="col-room">部屋</th>
                <th>利用者名</th>
                <th className="col-class">区分</th>
                <th className="col-check">入浴</th>
                <th>備考</th>
              </tr>
            </thead>
            <tbody>
              {filteredPlans.length === 0 ? (
                <tr><td colSpan={6} style={{ textAlign: "center" }}>予定なし</td></tr>
              ) : filteredPlans.map(({ plan, resident }, i) => (
                <tr key={plan.id}>
                  <td className="col-no">{i + 1}</td>
                  <td className="col-room">{resident.部屋番号}</td>
                  <td>{resident.名前}</td>
                  <td className="col-class">{resident.区分}</td>
                  <td className="col-check">□</td>
                  <td>&nbsp;</td>
                </tr>
              ))}
            </tbody>
          </table>

          <div className="print-footer">
            <span>合計 <strong>{filteredPlans.length}</strong>名</span>
            <span>印刷日時：{printedAt}</span>
          </div>
        </div>
      );
    }

    function DateNav({ targetDate, onChange, summary }) {

      };

        d.setHours(0, 0, 0, 0);
        onChange(d);
      };
      return (
        <div className="date-nav">
          <button type="button" className="date-nav-arrow" onClick={() => stepDays(-1)} aria-label="前日">‹</button>
          <div className="date-nav-current">{formatDateJa(targetDate)}</div>
          <button type="button" className="date-nav-arrow" onClick={() => stepDays(1)} aria-label="翌日">›</button>
          <button type="button" className="date-nav-jump" onClick={jumpTomorrow}>明日へ</button>
          <div className="date-nav-summary">{summary}</div>
        </div>
      );

        if (lastDays == null) return "未浴";

        <button
          type="button"
          className={[
            "edit-card",
            isPlannedAM && "is-planned-am",
            isPlannedPM && "is-planned-pm",
            isBathedToday && "is-bathed-today",
            level === "critical" && "is-warn-critical",

          onClick={() => onTap(resident.id)}
        >
          {isShort && <span className="edit-card-short">短期</span>}
          {isPlannedAM && <span className="edit-session-pill">午前</span>}

            <div className="edit-card-name">{resident.名前}</div>

            "edit-card-last",
            level === "attention" && "is-warn-attention",
            level === "critical" && "is-warn-critical",
          ].filter(Boolean).join(" ")}>
            {(level === "attention" || level === "critical") && <span className="warn-icon" />}
