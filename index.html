    function EditModeView({ data, today, onBack, onTogglePlanForEdit }) {
      const [targetDate, setTargetDate] = useState(() => {
        const d = new Date(today);
        d.setDate(d.getDate() + 1);
        d.setHours(0, 0, 0, 0);
        return d;
      });
      const [session, setSession] = useState("AM");
      const [sortKey, setSortKey] = useState("lastBath");
      const [search, setSearch] = useState("");
      const [filters, setFilters] = useState({
        unplanned: false,
        threeDays: false,
        shortStay: false,
      });

      const dateStr = ymd(targetDate);
      const thresholds = data.settings.警告レベル;

      const lastBathMap = useMemo(
        () => computeLastBathDate(data.bathPlans, dateStr),
        [data.bathPlans, dateStr]
      );
      const bathedTodaySet = useMemo(
        () => computeBathedToday(data.bathPlans, dateStr),
        [data.bathPlans, dateStr]
      );

      const targetPlans = useMemo(
        () => data.bathPlans.filter(p => p.日付 === dateStr && p.状態 === "予定"),
        [data.bathPlans, dateStr]
      );
      const planByResident = useMemo(() => {
        const m = new Map();
        targetPlans.forEach(p => m.set(p.利用者ID, p.セッション));
        return m;
      }, [targetPlans]);

      const amCount = useMemo(() => targetPlans.filter(p => p.セッション === "AM").length, [targetPlans]);
      const pmCount = useMemo(() => targetPlans.filter(p => p.セッション === "PM").length, [targetPlans]);

      // 利用者リストの加工（在籍中のみ→フィルタ→ソート）
      const enriched = useMemo(() => {
        return data.residents
          .filter(r => r.在籍中)
          .map(r => {
            const last = lastBathMap.get(r.id) || null;
            const days = daysSince(last, dateStr);
            // 目標除外の利用者は警告色を出さない
            const level = isResidentExcluded(r) ? "normal" : warnLevel(days, thresholds);
            return {
              resident: r,
              lastDate: last,
              lastDays: days,
              level,
              planSession: planByResident.get(r.id) || null,
              isBathedToday: bathedTodaySet.has(r.id),
            };
          });
      }, [data.residents, lastBathMap, planByResident, bathedTodaySet, dateStr, thresholds]);

      const filtered = useMemo(() => {
        let list = enriched;
        if (filters.unplanned) list = list.filter(x => !x.planSession);
        if (filters.threeDays) list = list.filter(x => x.level !== "normal");
        if (filters.shortStay) list = list.filter(x => x.resident.区分 === "短期");
        if (search.trim()) {
          const q = search.trim();
          list = list.filter(x =>
            x.resident.名前.includes(q) ||
            (x.resident.フリガナ || "").includes(q) ||
            (x.resident.部屋番号 || "").includes(q)
          );
        }
        return list;
      }, [enriched, filters, search]);

      const sorted = useMemo(() => {
        const arr = [...filtered];
        if (sortKey === "lastBath") {
          // 経過日数が大きい順（古い順）。null（未浴）を最優先
          arr.sort((a, b) => {
            if (a.lastDays == null && b.lastDays == null) return sortByKana(a.resident, b.resident);
            if (a.lastDays == null) return -1;
            if (b.lastDays == null) return 1;
            return b.lastDays - a.lastDays;
          });
        } else if (sortKey === "room") {
          arr.sort((a, b) => sortByRoom(a.resident, b.resident));
        } else if (sortKey === "kana") {
          arr.sort((a, b) => sortByKana(a.resident, b.resident));
        }
        return arr;
      }, [filtered, sortKey]);

      const totalResidents = data.residents.filter(r => r.在籍中).length;
      const summary = `${dateStr.replace(/-/g, "/")} ／ ${amCount + pmCount}名予定`;

      const handleTap = (residentId) => {
        onTogglePlanForEdit(residentId, dateStr, session);
      };

      // キーボードショートカット：←→で前後日、ESCで記録に戻る
      useEffect(() => {
        const onKey = (e) => {
          const tag = (e.target?.tagName || "").toLowerCase();
          if (tag === "input" || tag === "textarea" || tag === "select") return;
          // モーダルが開いている時は ESC をモーダル側に任せ、矢印キーも無効化
          if (document.querySelector(".modal-overlay")) return;
          if (e.key === "ArrowLeft") {
            const d = new Date(targetDate); d.setDate(d.getDate() - 1); setTargetDate(d);
          } else if (e.key === "ArrowRight") {
            const d = new Date(targetDate); d.setDate(d.getDate() + 1); setTargetDate(d);
          } else if (e.key === "Escape") {
            onBack();
          }
        };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [targetDate, onBack]);

      const [printMode, setPrintMode] = useState(null); // null | "AM" | "PM" | "BOTH"

      const handlePrint = (mode) => {
        setPrintMode(mode);
        // DOM 反映を待ってから印刷（次のフレーム）
        setTimeout(() => {
          window.print();
          // 印刷後にモードを戻す
          setTimeout(() => setPrintMode(null), 50);
        }, 50);
      };

      return (
        <div>
          {printMode && (
            <PrintableSchedule
              residents={data.residents}
              plans={data.bathPlans}
              dateStr={dateStr}
              session={session}
              settings={data.settings}
              mode={printMode}
            />
          )}
          <div className={printMode ? "no-print" : ""}>
            <ModeBanner onBack={onBack} />
            <div className="tab-panel">
              <DateNav targetDate={targetDate} onChange={setTargetDate} summary={summary} />
              <div className="record-toolbar no-print">
                <span className="record-toolbar-spacer" />
                <PrintModeButton onPrint={() => handlePrint("AM")} label="午前を印刷" />
                <PrintModeButton onPrint={() => handlePrint("PM")} label="午後を印刷" />
                <PrintModeButton onPrint={() => handlePrint("BOTH")} label="両方を印刷" />
              </div>
            <FilterBar
              sortKey={sortKey}
              onSortKey={setSortKey}
              session={session}
              onSession={setSession}
              amCount={amCount}
              pmCount={pmCount}
              search={search}
              onSearch={setSearch}
              filters={filters}
              onToggleFilter={(k) => setFilters(prev => ({ ...prev, [k]: !prev[k] }))}
            />
            {sorted.length === 0 ? (
              <EmptyState
                title="該当する利用者がいません"
                body="フィルタや検索を見直してください。"
              />
            ) : (
              <div className="card-grid">
                {sorted.map(item => (
                  <EditCard
                    key={item.resident.id}
                    resident={item.resident}
                    planSession={item.planSession}
                    isBathedToday={item.isBathedToday}
                    lastDays={item.lastDays}
                    level={item.level}
                    onTap={handleTap}
                  />
                ))}
              </div>
            )}
            <div className="edit-footer">
              <span>変更は自動保存されます</span>
              <span>
                <strong>{totalResidents}</strong>名中 <strong>{amCount + pmCount}</strong>名予定
                （午前 <strong>{amCount}</strong> ／ 午後 <strong>{pmCount}</strong>）
              </span>
            </div>
            </div>
          </div>
        </div>
      );
    }

    function RecordTab({ data, today, session, onChangeSession, onTogglePlan, onOpenMenu, onOpenTeam, onEnterEdit }) {
      const dateStr = ymd(today);

      const amItems = useMemo(
        () => selectTodayPlans(data.bathPlans, data.residents, dateStr, "AM"),
        [data.bathPlans, data.residents, dateStr]
      );
      const pmItems = useMemo(
        () => selectTodayPlans(data.bathPlans, data.residents, dateStr, "PM"),
        [data.bathPlans, data.residents, dateStr]
      );

      const items = session === "AM" ? amItems : pmItems;
      const doneCount = items.filter(i => i.plan.状態 === "済").length;

      const currentTeam = useMemo(
        () => findTeam(data.sessionTeams, dateStr, session),
        [data.sessionTeams, dateStr, session]
      );

      return (
        <div className="record-section">
          <div className="record-toolbar">
            <span className="record-toolbar-spacer" />
            <button type="button" className="record-edit-link" onClick={onEnterEdit}>
              予定を編集 →
            </button>
          </div>
          <SessionTabs
            active={session}
            onChange={onChangeSession}
            amCount={amItems.length}
            pmCount={pmItems.length}
          />
          {items.length === 0 ? (
            <EmptyState
              title="本日の予定はまだ組まれていません"
              body="予定編集モード（フェーズ4で実装予定）から予定を組んでください。動作確認したい場合は、開発ツールバーの「本日サンプル予定」ボタンで仮データを作成できます。"
            />
          ) : (
            <>
              <ProgressBar doneCount={doneCount} totalCount={items.length} />
              <div className="card-grid">
                {items.map(({ plan, resident }) => (
                  <ResidentCard
                    key={plan.id}
                    resident={resident}
                    plan={plan}
                    onToggle={onTogglePlan}
                    onOpenMenu={() => onOpenMenu({ plan, resident })}
                  />
                ))}
              </div>
            </>
          )}
          <TeamSummary
            team={currentTeam}
            staffList={data.staff}
            session={session}
            onOpen={onOpenTeam}
          />
        </div>
      );
    }

    function DevBar({ stats, onSeed, onSeedToday, onSeedHistory, onClear, onReload }) {
      return (
        <div className="devbar no-print">
          <span className="devbar-label">[開発] フェーズ5: 記録一覧</span>
          <span className="devbar-stat">利用者 <strong>{stats.residents}</strong></span>
          <span className="devbar-stat">スタッフ <strong>{stats.staff}</strong></span>
          <span className="devbar-stat">予定/記録 <strong>{stats.bathPlans}</strong></span>
          <span className="devbar-stat">体制 <strong>{stats.sessionTeams}</strong></span>
          <button className="devbar-button" onClick={onSeed}>サンプル投入</button>
          <button className="devbar-button" onClick={onSeedToday}>本日サンプル予定</button>
          <button className="devbar-button" onClick={onSeedHistory}>過去60日履歴</button>
          <button className="devbar-button" onClick={onReload}>再読込</button>
          <button className="devbar-button is-danger" onClick={onClear}>全データ削除</button>
        </div>
      );
    }

    /**
     * 開発モード判定：URL に `?dev=1` が含まれる時のみ true。
     * 永続化はしないので、パラメータなしでアクセスすれば常に本番モード。
     * 過去のバージョンで残った可能性のある localStorage フラグは消しておく。
     */
    const isDevMode = (() => {
      try {
        // 過去バージョンの永続化フラグをクリーンアップ
        localStorage.removeItem("ofurocho.devMode");
        const url = new URL(window.location.href);
        return url.searchParams.get("dev") === "1";
      } catch {
        return false;
      }
    })();

    function App() {
      const [today] = useState(() => new Date());
      const [activeTab, setActiveTab] = useState("record");
      const [mode, setMode] = useState("record"); // "record" | "edit"
      const [data, setData] = useState(() => storage.loadAll());
      const [session, setSession] = useState("AM");
      const [teamModalOpen, setTeamModalOpen] = useState(false);

      const reload = useCallback(() => {
        setData(storage.loadAll());
      }, []);

      const handleSeed = useCallback(() => {
        if (data.residents.length > 0 || data.staff.length > 0) {
          if (!window.confirm("既存のサンプルデータを上書きします。よろしいですか？")) return;
        }
        seedAll();
        reload();
      }, [data.residents.length, data.staff.length, reload]);

      const handleSeedHistory = useCallback(() => {
        if (data.residents.length === 0) {
          window.alert("先に「サンプル投入」で利用者データを作成してください。");
          return;
        }
        const dateStr = ymd(today);
        const existingPast = data.bathPlans.filter(p => p.日付 < dateStr);
        if (existingPast.length > 0) {
          if (!window.confirm("過去の入浴記録が既にあります。上書きしますか？")) return;
        }
        const future = data.bathPlans.filter(p => p.日付 >= dateStr);
        const past = seedPastHistory(data.residents, today, 60);
        storage.set(KEYS.bathPlans, [...past, ...future]);
        reload();
      }, [data.bathPlans, data.residents, today, reload]);

      const handleSeedToday = useCallback(() => {
        if (data.residents.length === 0) {
          window.alert("先に「サンプル投入」で利用者データを作成してください。");
          return;
        }
        const dateStr = ymd(today);
        const existing = data.bathPlans.filter(p => p.日付 === dateStr);
        if (existing.length > 0) {
          if (!window.confirm("本日の予定が既にあります。上書きしますか？")) return;
        }
        const others = data.bathPlans.filter(p => p.日付 !== dateStr);
        const todayPlans = seedTodayPlans(data.residents, today);
        const next = [...others, ...todayPlans];
        storage.set(KEYS.bathPlans, next);
        reload();
      }, [data.bathPlans, data.residents, today, reload]);

      const handleClear = useCallback(() => {
        if (!window.confirm("全データを削除します。よろしいですか？\n（この操作は取り消せません）")) return;
        if (!window.confirm("本当に全データを削除します。最終確認です。")) return;
        storage.clearAll();
        reload();
      }, [reload]);

      const handleTogglePlan = useCallback((planId) => {
        // 体制と記録は時間順序が独立。体制未設定でもそのまま記録できる。
        // 体制が後から入力された時、handleSaveTeam が遡って 体制ID を紐付ける。
        const dateStr = ymd(today);
        const target = data.bathPlans.find(p => p.id === planId);
        if (!target) return;
        const team = findTeam(data.sessionTeams, dateStr, target.セッション);
        const teamId = team ? team.id : null;
        setData(prev => {
          const nextPlans = togglePlanStatus(prev.bathPlans, planId, teamId);
          storage.set(KEYS.bathPlans, nextPlans);
          return { ...prev, bathPlans: nextPlans };
        });
      }, [today, data.bathPlans, data.sessionTeams]);

      const handleSaveTeam = useCallback((team) => {
        setData(prev => {
          const nextTeams = saveTeam(prev.sessionTeams, team);
          storage.set(KEYS.sessionTeams, nextTeams);
          // 体制と記録の時間独立：保存時、同日同セッションの記録のうち
          // 体制IDが未設定 or この体制と同じIDのものに遡って紐付ける。
          // 別の体制IDが既に振られている記録（過去の体制保存で確定したもの）はそのまま。
          const nextPlans = prev.bathPlans.map(p => {
            if (p.日付 !== team.日付) return p;
            if (p.セッション !== team.セッション) return p;
            if (p.体制ID && p.体制ID !== team.id) return p;
            return { ...p, 体制ID: team.id };
          });
          const plansChanged = nextPlans.some((p, i) => p !== prev.bathPlans[i]);
          if (plansChanged) {
            storage.set(KEYS.bathPlans, nextPlans);
          }
          return {
            ...prev,
            sessionTeams: nextTeams,
            bathPlans: plansChanged ? nextPlans : prev.bathPlans,
          };
        });
      }, []);

      const handleOpenTeam = useCallback(() => {
        if (data.staff.length === 0) {
          window.alert("先にスタッフデータを取り込んでください。\n（開発時は「サンプル投入」でOK）");
          return;
        }
        setTeamModalOpen(true);
      }, [data.staff.length]);

      const handleTogglePlanForEdit = useCallback((residentId, dateStr, activeSession) => {
        setData(prev => {
          const nextPlans = togglePlanForEdit(prev.bathPlans, residentId, dateStr, activeSession);
          if (nextPlans === prev.bathPlans) return prev;
          storage.set(KEYS.bathPlans, nextPlans);
          return { ...prev, bathPlans: nextPlans };
        });
      }, []);

      // バックアップ催促モーダル
      const [backupReminderOpen, setBackupReminderOpen] = useState(false);

      // 起動時とデータ変更時に判定（24h以上経過＋スヌーズ期限経過）
      useEffect(() => {
        // 利用者・スタッフが未登録なら表示しない（取り込み前は催促無意味）
        if (data.residents.length === 0 && data.staff.length === 0) {
          setBackupReminderOpen(false);
          return;
        }
        const lastAt = data.settings.最終バックアップ ? new Date(data.settings.最終バックアップ).getTime() : 0;
        const snoozeUntil = data.settings.バックアップ催促次回
          ? new Date(data.settings.バックアップ催促次回).getTime() : 0;
        const now = Date.now();
        const hoursElapsed = lastAt ? (now - lastAt) / (1000 * 60 * 60) : 999999;
        const isOverdue = hoursElapsed >= 24;
        const isSnoozing = snoozeUntil > now;
        setBackupReminderOpen(isOverdue && !isSnoozing);
      }, [data.settings.最終バックアップ, data.settings.バックアップ催促次回, data.residents.length, data.staff.length]);

      const handleBackupReminderLater = useCallback(() => {
        const next = new Date(Date.now() + 4 * 60 * 60 * 1000).toISOString();
        const nextSettings = { ...data.settings, バックアップ催促次回: next };
        setData(prev => {
          storage.set(KEYS.settings, nextSettings);
          return { ...prev, settings: nextSettings };
        });
        setBackupReminderOpen(false);
      }, [data.settings]);

      const [unimplementedTarget, setUnimplementedTarget] = useState(null);
      const handleOpenUnimplementedMenu = useCallback((targetObj) => {
        setUnimplementedTarget(targetObj);
      }, []);
      const handleMarkUnimplemented = useCallback((planId, reason, memo) => {
        setData(prev => {
          const nextPlans = markPlanUnimplemented(prev.bathPlans, planId, reason, memo);
          storage.set(KEYS.bathPlans, nextPlans);
          return { ...prev, bathPlans: nextPlans };
        });
      }, []);

      const [residentListOpen, setResidentListOpen] = useState(false);
      const [residentEditTarget, setResidentEditTarget] = useState(null);
      const residentEditOpen = residentEditTarget !== null;
      const [staffEditTarget, setStaffEditTarget] = useState(null); // null=未表示, false=新規, object=編集対象
      const staffEditOpen = staffEditTarget !== null;

      const handleEditResident = useCallback((r) => setResidentEditTarget(r), []);
      const handleSaveResident = useCallback((nextResident) => {
        setData(prev => {
          const list = prev.residents.map(r => r.id === nextResident.id ? nextResident : r);
          storage.set(KEYS.residents, list);
          return { ...prev, residents: list };
        });
      }, []);

      const handleAddStaff = useCallback(() => setStaffEditTarget(false), []);
      const handleEditStaff = useCallback((s) => setStaffEditTarget(s), []);
      const handleSaveStaff = useCallback((nextStaff, isUpdate) => {
        setData(prev => {
          const exists = prev.staff.some(s => s.id === nextStaff.id);
          const list = exists
            ? prev.staff.map(s => s.id === nextStaff.id ? nextStaff : s)
            : [...prev.staff, nextStaff];
          storage.set(KEYS.staff, list);
          return { ...prev, staff: list };
        });
      }, []);
      const handleDeleteStaff = useCallback((staffId) => {
        setData(prev => {
          const list = prev.staff.filter(s => s.id !== staffId);
          storage.set(KEYS.staff, list);
          return { ...prev, staff: list };
        });
      }, []);

      const handleUpdateSettings = useCallback((nextSettings) => {
        setData(prev => {
          storage.set(KEYS.settings, nextSettings);
          return { ...prev, settings: nextSettings };
        });
      }, []);

      const handleBackup = useCallback(() => {
        const backup = buildBackup(data);
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        const dateStr = ymd(new Date());
        triggerDownload(blob, `ofurocho-backup-${dateStr}.json`);
        // アプリ内にもスナップショットとして保存（復元ワンタップ用）
        storage.set(KEYS.backupSnapshot, backup);
        // 最終バックアップ時刻を更新、催促スヌーズもリセット
        const nextSettings = {
          ...data.settings,
          最終バックアップ: new Date().toISOString(),
          バックアップ催促次回: null,
        };
        handleUpdateSettings(nextSettings);
        setBackupReminderOpen(false);
      }, [data, handleUpdateSettings]);

      const handleRestoreFromSnapshot = useCallback(() => {
        const snap = storage.get(KEYS.backupSnapshot, null);
        if (!snap || !snap.data) {
          window.alert("アプリ内のバックアップがありません。\n先にバックアップを取ってください。");
          return;
        }
        if (!window.confirm(
          `直近のバックアップ（${new Date(snap.exportedAt).toLocaleString("ja-JP")}）` +
          `に戻します。\n\n現在のデータはすべて上書きされます。よろしいですか？`
        )) return;
        handleRestore(snap.data);
        window.alert("復元が完了しました。ページを再読み込みします。");
        window.location.reload();
      }, []);

      const handleImport = useCallback((parsed) => {
        setData(prev => {
          const next = { ...prev };
          if (parsed.residents) {
            next.residents = parsed.residents;
            storage.set(KEYS.residents, parsed.residents);
          }
          if (parsed.staff) {
            next.staff = parsed.staff;
            storage.set(KEYS.staff, parsed.staff);
          }
          return next;
        });
      }, []);

      const handleRestore = useCallback((backupData) => {
        // 全キーを上書き
        if (Array.isArray(backupData.residents))    storage.set(KEYS.residents,    backupData.residents);
        if (Array.isArray(backupData.staff))        storage.set(KEYS.staff,        backupData.staff);
        if (Array.isArray(backupData.bathPlans))    storage.set(KEYS.bathPlans,    backupData.bathPlans);
        if (Array.isArray(backupData.sessionTeams)) storage.set(KEYS.sessionTeams, backupData.sessionTeams);
        if (backupData.settings && typeof backupData.settings === "object") {
          storage.set(KEYS.settings, backupData.settings);
        }
        // ページリロードは呼び出し側で実行
      }, []);

      const handleClearAllFromSettings = useCallback(() => {
        storage.clearAll();
        reload();
      }, [reload]);

      const stats = useMemo(() => ({
        residents:    data.residents.length,
        staff:        data.staff.length,
        bathPlans:    data.bathPlans.length,
        sessionTeams: data.sessionTeams.length,
      }), [data]);

      const renderTab = () => {
        switch (activeTab) {
          case "record":
            return (
              <RecordTab
                data={data}
                today={today}
                session={session}
                onChangeSession={setSession}
                onTogglePlan={handleTogglePlan}
                onOpenMenu={handleOpenUnimplementedMenu}
                onOpenTeam={handleOpenTeam}
                onEnterEdit={() => setMode("edit")}
              />
            );
          case "list":
            return <ListTab data={data} today={today} />;
          case "settings":
            return (
              <SettingsTab
                data={data}
                onUpdateSettings={handleUpdateSettings}
                onImport={handleImport}
                onRestore={handleRestore}
                onRestoreFromSnapshot={handleRestoreFromSnapshot}
                onBackup={handleBackup}
                onClearAll={handleClearAllFromSettings}
                onOpenResidentList={() => setResidentListOpen(true)}
                onAddStaff={handleAddStaff}
                onEditStaff={handleEditStaff}
                onDeleteStaff={handleDeleteStaff}
              />
            );
          default:
            return null;
        }
      };

      const noData = data.residents.length === 0 && data.staff.length === 0;

      if (mode === "edit") {
        return (
          <div className="app">
            <EditModeView
              data={data}
              today={today}
              onBack={() => setMode("record")}
              onTogglePlanForEdit={handleTogglePlanForEdit}
            />
            {isDevMode && (
              <DevBar
                stats={stats}
                onSeed={handleSeed}
                onSeedToday={handleSeedToday}
                onSeedHistory={handleSeedHistory}
                onClear={handleClear}
                onReload={reload}
              />
            )}
            <BackupReminderModal
              open={backupReminderOpen}
              lastBackupAt={data.settings.最終バックアップ}
              onBackupNow={handleBackup}
              onLater={handleBackupReminderLater}
            />
          </div>
        );
      }

      // データが空なら、設定タブ以外では Welcome を表示
      const showWelcome = noData && activeTab !== "settings";

      return (
        <div className="app">
          <Header today={today} />
          <TabNav active={activeTab} onChange={setActiveTab} />
          {isDevMode && (
            <DevBar
              stats={stats}
              onSeed={handleSeed}
              onSeedToday={handleSeedToday}
              onSeedHistory={handleSeedHistory}
              onClear={handleClear}
              onReload={reload}
            />
          )}
          <main className="tab-panel">
            {showWelcome ? (
              <Welcome
                onGoSettings={() => setActiveTab("settings")}
                onSeed={handleSeed}
                isDevMode={isDevMode}
              />
            ) : (
              renderTab()
            )}
          </main>
          <TeamModal
            open={teamModalOpen}
            onClose={() => setTeamModalOpen(false)}
            dateStr={ymd(today)}
            initialSession={session}
            sessionTeams={data.sessionTeams}
            staffList={data.staff}
            onSave={handleSaveTeam}
          />
          <ResidentListModal
            open={residentListOpen}
            onClose={() => setResidentListOpen(false)}
            residents={data.residents}
            defaultGoalPerWeek={data.settings.入浴目標.週}
            onEditResident={handleEditResident}
          />
          <ResidentEditModal
            open={residentEditOpen}
            onClose={() => setResidentEditTarget(null)}
            target={residentEditTarget}
            defaultGoalPerWeek={data.settings.入浴目標.週}
            onSave={handleSaveResident}
          />
          <UnimplementedModal
            open={unimplementedTarget !== null}
            onClose={() => setUnimplementedTarget(null)}
            target={unimplementedTarget}
            onSave={handleMarkUnimplemented}
          />
          <BackupReminderModal
            open={backupReminderOpen}
            lastBackupAt={data.settings.最終バックアップ}
            onBackupNow={handleBackup}
            onLater={handleBackupReminderLater}
          />
          <StaffEditModal
            open={staffEditOpen}
            onClose={() => setStaffEditTarget(null)}
            target={staffEditTarget || null}
            onSave={handleSaveStaff}
          />
        </div>
      );
    }

    /* ============================================================
       6. マウント
       ============================================================ */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
